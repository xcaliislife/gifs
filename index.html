<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF to Video Converter Pro</title>

    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js');
        });
      }
    </script>

    
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-radius: 16px;
            --box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            --font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--panel-bg);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            width: 100%;
            max-width: 550px;
            text-align: center;
        }

        h2 { margin: 0; color: white; font-size: 2em; }
        .subtitle { color: var(--text-muted); margin-bottom: 25px; }

        .controls-wrapper {
            background-color: #334155;
            padding: 25px;
            border-radius: var(--border-radius);
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Selector de formato */
        .format-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            background: #0f172a;
            padding: 5px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .format-option { flex: 1; }
        .format-option input { display: none; }
        .format-option label {
            display: block;
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
            font-weight: 600;
            color: var(--text-muted);
        }

        .format-option input:checked + label {
            background: var(--primary-color);
            color: white;
        }

        .file-input-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            background-color: #475569;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        #fileInput { display: none; }

        .convert-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 700;
            transition: 0.3s;
        }

        .convert-btn:disabled { background-color: #475569; opacity: 0.6; }

        #status {
            font-size: 0.9em;
            padding: 12px;
            background: #0f172a;
            border-radius: 8px;
            margin-bottom: 20px;
            color: var(--text-muted);
        }

        canvas {
            width: 100%;
            border-radius: 12px;
            border: 2px solid #334155;
            display: none;
        }
    </style>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div class="container">
        <h2>GIF to Video Pro</h2>
        <p class="subtitle">Convierte a WebM o MP4 de forma profesional</p>
        
        <div class="controls-wrapper">
            <label for="fileInput" class="file-input-label">
                <i class='bx bx-upload' style="margin-right: 8px;"></i>
                <span id="fileInputLabelText">Seleccionar GIF</span>
            </label>
            <input type="file" id="fileInput" accept="image/gif">

            <div class="format-selector">
                <div class="format-option">
                    <input type="radio" name="format" id="webm" value="webm" checked>
                    <label for="webm">WebM</label>
                </div>
                <div class="format-option">
                    <input type="radio" name="format" id="mp4" value="mp4">
                    <label for="mp4">MP4 (H.264)</label>
                </div>
            </div>
            
            <button id="convertBtn" class="convert-btn" disabled>
                Convertir Ahora
            </button>
        </div>

        <div id="status">Cargando motores de video...</div>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: false });
        
        const fileInput = document.getElementById('fileInput');
        const fileInputLabelText = document.getElementById('fileInputLabelText');
        const convertBtn = document.getElementById('convertBtn');
        const status = document.getElementById('status');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let decoder;

        // Cargar FFmpeg inmediatamente
        (async () => {
            try {
                await ffmpeg.load();
                status.innerText = "🚀 Listo para convertir.";
            } catch (e) {
                status.innerText = "⚠️ Error de seguridad. Refresca la página.";
                console.error(e);
            }
        })();

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            fileInputLabelText.innerText = file.name;
            status.innerText = "Leyendo GIF...";
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                decoder = new ImageDecoder({ data: arrayBuffer, type: 'image/gif' });
                await decoder.tracks.ready;
                
                const frame = await decoder.decode({ frameIndex: 0 });
                canvas.width = frame.image.displayWidth;
                canvas.height = frame.image.displayHeight;
                canvas.style.display = 'block';
                ctx.drawImage(frame.image, 0, 0);

                convertBtn.disabled = false;
                status.innerText = `✅ GIF listo (${decoder.tracks[0].frameCount} cuadros).`;
            } catch (err) {
                status.innerText = "❌ Error al cargar. Usa Chrome o Edge.";
            }
        });

        convertBtn.addEventListener('click', async () => {
            convertBtn.disabled = true;
            const format = document.querySelector('input[name="format"]:checked').value;
            const frameCount = decoder.tracks[0].frameCount;
            const chunks = [];

            // 1. Grabar a WebM (Buffer temporal)
            const stream = canvas.captureStream(30);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });

            recorder.ondataavailable = e => chunks.push(e.data);
            
            recorder.onstop = async () => {
                const webmBlob = new Blob(chunks, { type: 'video/webm' });

                if (format === 'mp4') {
                    status.innerText = "⚙️ Procesando MP4... (No cierres la app)";
                    const name = 'input.webm';
                    ffmpeg.FS('writeFile', name, await fetchFile(webmBlob));
                    
                    // Conversión FFmpeg
                    await ffmpeg.run('-i', name, '-c:v', 'libx264', '-pix_fmt', 'yuv420p', 'output.mp4');
                    
                    const data = ffmpeg.FS('readFile', 'output.mp4');
                    download(new Blob([data.buffer], { type: 'video/mp4' }), "video.mp4");
                } else {
                    download(webmBlob, "video.webm");
                }
                
                status.innerText = "🎉 ¡Conversión exitosa!";
                convertBtn.disabled = false;
            };

            recorder.start();
            status.innerText = "🔴 Capturando cuadros...";

            for (let i = 0; i < frameCount; i++) {
                const result = await decoder.decode({ frameIndex: i });
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(result.image, 0, 0);
                const duration = (result.image.duration / 1000) || 100;
                await new Promise(r => setTimeout(r, duration));
            }


            recorder.stop();
        });

    }
const data = await ffmpeg.readFile('output.mp4');

// Crear el enlace de descarga de forma segura
const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
const a = document.createElement('a');
a.href = url;
a.download = 'video-convertido.mp4';
document.body.appendChild(a);
a.click();

// IMPORTANTE: Limpiar la memoria después de 1 segundo
setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}, 1000);

        
       
    </script>
    
</body>
</html>
