<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<script>
  // Este código registra el Service Worker que permite usar FFmpeg (MP4) en GitHub
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registrado', reg))
        .catch(err => console.log('Error al registrar SW', err));
    });
  }
</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF to Video Converter - Modern Edition</title>
    <style>
        /* --- CSS Moderno y Elegante --- */
        
        :root {
            --primary-color: #4a90e2; /* Azul principal */
            --primary-hover: #357abd; /* Azul al pasar el mouse */
            --bg-color: #f4f7f6; /* Fondo gris muy claro */
            --panel-bg: #ffffff; /* Fondo del panel blanco */
            --text-color: #333333; /* Texto principal */
            --text-muted: #777777; /* Texto secundario */
            --border-radius: 12px;
            --box-shadow: 0 8px 30px rgba(0,0,0,0.1); /* Sombra suave */
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--panel-bg);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            width: 100%;
            max-width: 650px; /* Ancho máximo para el panel */
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            font-weight: 700;
            font-size: 2.2em;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .controls-wrapper {
            background-color: #fafbfc;
            padding: 25px;
            border-radius: var(--border-radius);
            border: 1px solid #e1e8ed;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        /* Estilo para el input de archivo personalizado */
        .file-input-label {
            display: inline-flex;
            align-items: center;
            padding: 12px 24px;
            background-color: #e8f0fe;
            color: var(--primary-color);
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s ease, transform 0.1s ease;
            font-size: 0.95em;
        }

        .file-input-label:hover {
            background-color: #d2e3fc;
        }
        
        .file-input-label i { /* Ícono */
            margin-right: 10px;
            font-size: 1.1em;
        }

        #fileInput {
            display: none; /* Ocultar el input original feo */
        }

        .convert-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: background-color 0.3s ease, transform 0.1s ease, box-shadow 0.3s ease;
            display: inline-flex;
            align-items: center;
        }

        .convert-btn:hover:not(:disabled) {
            background-color: var(--primary-hover);
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
        }
        
        .convert-btn:active:not(:disabled) {
            transform: translateY(1px);
        }

        .convert-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            color: #ffffff;
        }
        
        .convert-btn i {
            margin-right: 12px;
            font-size: 1.2em;
        }

        #status {
            font-weight: 600;
            padding: 15px 25px;
            background-color: #f1f3f4;
            color: var(--text-color);
            border-radius: 8px;
            display: inline-block;
            margin: 10px 0;
            font-size: 0.95em;
            border: 1px solid #d1d9e0;
        }
        
        #status.success {
            background-color: #e6fffa;
            color: #2c7a7b;
            border-color: #b2f5ea;
        }
        
        #status.processing {
            background-color: #fffaf0;
            color: #c05621;
            border-color: #feebc8;
        }
        
        #status.error {
            background-color: #fff5f5;
            color: #c53030;
            border-color: #fed7d7;
        }

        .canvas-container {
            position: relative;
            margin-top: 25px;
            display: flex;
            justify-content: center;
            border-radius: var(--border-radius);
            overflow: hidden; /* Para que el canvas respete los bordes redondeados */
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        canvas {
            border: 2px solid var(--primary-color);
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: var(--border-radius);
        }
        
        .instrucciones {
            font-size: 0.9em;
            color: #888;
            margin-top: -10px;
            margin-bottom: 25px;
        }

        /* Responsive para pantallas muy pequeñas */
        @media (max-width: 500px) {
            .container {
                padding: 25px;
            }
            
            h2 {
                font-size: 1.8em;
            }
            
            .controls-wrapper {
                padding: 15px;
            }
            
            .convert-btn, .file-input-label {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div class="container">
        <h2>GIF to Video</h2>
        <p class="subtitle">Convierte tus GIFs animados en archivos de video WebM.</p>
        <p class="instrucciones"><em>Funciona mejor en Chrome y Edge. Graba un solo ciclo automáticamente.</em></p>
        
        <div class="controls-wrapper">
            <label for="fileInput" class="file-input-label">
                <i class='bx bx-cloud-upload'></i>
                <span id="fileInputLabelText">Seleccionar GIF</span>
            </label>
            <input type="file" id="fileInput" accept="image/gif">
            
            <button id="convertBtn" class="convert-btn" disabled>
                <i class='bx bx-play-circle'></i>
                <span>Convertir Automáticamente</span>
            </button>
        </div>

        <div id="status">Esperando GIF...</div>
        
        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileInputLabelText = document.getElementById('fileInputLabelText');
        const convertBtn = document.getElementById('convertBtn');
        const status = document.getElementById('status');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let decoder;
        let mediaRecorder;
        let recordedChunks = [];

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Actualizar el texto del label con el nombre del archivo
            fileInputLabelText.innerText = file.name;
            
            status.innerText = "Cargando archivo...";
            status.className = ''; // Resetear clases de estado
            const arrayBuffer = await file.arrayBuffer();
            
            try {
                decoder = new ImageDecoder({ data: arrayBuffer, type: 'image/gif' });
                await decoder.tracks.ready;
                
                // Preparamos el canvas con el primer frame
                const frame = await decoder.decode({ frameIndex: 0 });
                canvas.width = frame.image.displayWidth;
                canvas.height = frame.image.displayHeight;
                ctx.drawImage(frame.image, 0, 0);

                convertBtn.disabled = false;
                status.innerText = `✅ GIF listo (${decoder.tracks[0].frameCount} cuadros).`;
                status.classList.add('success');
            } catch (err) {
                status.innerText = "❌ Error al procesar. Usa Chrome/Edge.";
                status.classList.add('error');
                console.error(err);
            }
        });

        convertBtn.addEventListener('click', async () => {
            if (!decoder) return;
            
            convertBtn.disabled = true;
            recordedChunks = [];
            const frameCount = decoder.tracks[0].frameCount;
            
            // Capturar stream a 30fps
            const stream = canvas.captureStream(30);
            
            // Intentar WebM VP9, si no WebM por defecto
            let options = { mimeType: 'video/webm;codecs=vp9' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm' };
            }
            
            mediaRecorder = new MediaRecorder(stream, options);

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "animacion_convertida.webm";
                a.click();
                status.innerText = "🎉 ¡Conversión completa! Archivo descargado.";
                status.classList.add('success');
                convertBtn.disabled = false;
            };

            // Iniciamos grabación
            mediaRecorder.start();
            status.innerText = "🔴 Procesando cuadros...";
            status.classList.remove('success', 'error');
            status.classList.add('processing');

            // Ciclo automático: recorre cada frame exactamente una vez
            for (let i = 0; i < frameCount; i++) {
                try {
                    const result = await decoder.decode({ frameIndex: i });
                    
                    // Limpiar y dibujar con fondo blanco para transparencia
                    ctx.fillStyle = "white";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(result.image, 0, 0);
                    
                    // Esperar el tiempo real del frame antes de pasar al siguiente
                    const duration = (result.image.duration / 1000) || 100; // ms, fallback 100ms
                    await new Promise(resolve => setTimeout(resolve, duration));
                } catch (frameError) {
                    console.error(`Error en frame ${i}:`, frameError);
                    // Podrías decidir saltar el frame o detenerte aquí
                }
            }

            // Al terminar el último frame, cerramos la grabación
            if(mediaRecorder.state === "recording") {
                mediaRecorder.stop();
            }
        });
    </script>
</body>
</html>
